name: Release

# Build the .s9pk packages and attach them to a GitHub Release when a version
# tag is pushed (e.g. `v3.4.0-10`). The attached assets are installable by URL
# on StartOS via System → Sideload. Also runnable via workflow_dispatch to
# smoke-test the build without cutting a release.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Least privilege by default; only the release job needs write access to
# create releases and upload assets.
permissions:
  contents: read

jobs:
  # Read the Makefile's TARGETS list (x86 arm) and turn it into a JSON matrix,
  # so we fan out one runner per architecture — the design the `print-%` target
  # in s9pk.mk was built for. This step needs only `make`, not start-cli.
  prepare:
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ steps.set.outputs.targets }}
    steps:
      - uses: actions/checkout@v4
      - id: set
        run: |
          targets=$(make -s print-TARGETS | tr ' ' '\n' | grep -v '^$' | jq -R . | jq -cs .)
          echo "targets=$targets" >> "$GITHUB_OUTPUT"
          echo "Build matrix: $targets"

  build:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJSON(needs.prepare.outputs.targets) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y squashfs-tools squashfs-tools-ng

      # Insurance for cross-architecture image extraction: on this x86 runner,
      # packing the aarch64 target reads an arm64 image's filesystem. Registering
      # QEMU/binfmt makes that reliable regardless of how start-cli extracts it.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Install start-cli
        env:
          # Pin start-cli to the version this repo actually builds with (the
          # 0.4.0-beta line that pairs with @start9labs/start-sdk in
          # package.json). The official install.sh only ever fetches the newest
          # release — currently a 2.x line whose asset naming differs and which
          # is a major version ahead of this package's SDK — so we download the
          # pinned Linux binary directly. Runners are x86_64 Linux regardless of
          # the target package architecture; the same start-cli packs all arches
          # via `--arch`. Bump this in lockstep with the SDK in package.json.
          START_CLI_TAG: v0.4.0-beta.9
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -fsSL \
            "https://github.com/Start9Labs/start-os/releases/download/${START_CLI_TAG}/start-cli_x86_64-linux" \
            -o "$HOME/.local/bin/start-cli"
          chmod +x "$HOME/.local/bin/start-cli"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Verify start-cli
        run: start-cli --version

      - name: Set up signing key
        env:
          # Optional: set a repo secret STARTOS_DEVELOPER_KEY (the PEM contents
          # of ~/.startos/developer.key.pem) to sign every release with the same
          # stable identity — recommended so StartOS treats successive releases
          # as updates from the same publisher. Without it, each build generates
          # an ephemeral key, which still produces a valid, installable .s9pk.
          STARTOS_DEVELOPER_KEY: ${{ secrets.STARTOS_DEVELOPER_KEY }}
        run: |
          mkdir -p ~/.startos
          if [ -n "$STARTOS_DEVELOPER_KEY" ]; then
            printf '%s\n' "$STARTOS_DEVELOPER_KEY" > ~/.startos/developer.key.pem
            echo "Using persistent developer key from secret."
          else
            start-cli init-key
            echo "::notice::No STARTOS_DEVELOPER_KEY secret set — generated an ephemeral signing key for this build."
          fi

      - name: Build ${{ matrix.target }}
        run: make ${{ matrix.target }}

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: s9pk-${{ matrix.target }}
          path: '*.s9pk'
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    # Only publish a release for tag pushes; workflow_dispatch runs stop after
    # build (artifacts are still available for download from the run).
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all packages
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Install start-cli
        env:
          START_CLI_TAG: v0.4.0-beta.9
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -fsSL \
            "https://github.com/Start9Labs/start-os/releases/download/${START_CLI_TAG}/start-cli_x86_64-linux" \
            -o "$HOME/.local/bin/start-cli"
          chmod +x "$HOME/.local/bin/start-cli"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Compose release notes
        # Build the release body from the packaged manifest, so the notes track
        # a single source of truth: `releaseNotes` in startos/versions/current.ts
        # feeds both StartOS's update screen and this GitHub Release.
        run: |
          pkg=$(ls dist/*_x86_64.s9pk | head -n1)
          manifest=$(start-cli s9pk inspect "$pkg" manifest)
          version=$(printf '%s' "$manifest" | jq -r .version)
          title=$(printf '%s' "$manifest" | jq -r .title)
          descShort=$(printf '%s' "$manifest" | jq -r '.description.short.en_US // ""')
          notes=$(printf '%s' "$manifest" | jq -r '.releaseNotes.en_US // ""')
          sdk=$(printf '%s' "$manifest" | jq -r .sdkVersion)
          {
            echo "$descShort"
            echo
            if [ -n "$notes" ]; then echo "## What's new"; echo; echo "$notes"; echo; fi
            echo "## Install"
            echo
            echo "Download the \`.s9pk\` for your server's architecture and sideload it via **System → Sideload** in the StartOS UI:"
            echo
            echo "- **ARM / aarch64** (e.g. Raspberry Pi, Start9 Pure): \`couchdb_aarch64.s9pk\`"
            echo "- **x86_64 / amd64**: \`couchdb_x86_64.s9pk\`"
            echo
            echo "## After installing"
            echo
            echo "Your admin password is generated automatically — there is no default. To retrieve it:"
            echo
            echo "1. Open the **CouchDB** service in StartOS."
            echo "2. Go to the **Actions** tab."
            echo "3. Run **Show Credentials** — your username (\`admin\`) and password are displayed; tap to copy."
            echo
            echo "StartOS also raises this as a task right after install, so you can jump straight to it. Use the same username and password in Obsidian's **Self-hosted LiveSync** plugin."
            echo
            echo "_${title} ${version} · SDK ${sdk}_"
          } > release-notes.md
          echo "----- release-notes.md -----"; cat release-notes.md

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ls -lh dist
          # Create the release with the .s9pk assets and composed notes; if it
          # already exists (a re-run of the same tag), refresh the notes and
          # replace the assets instead.
          if ! gh release create "$GITHUB_REF_NAME" dist/*.s9pk \
                --repo "$GITHUB_REPOSITORY" \
                --title "$GITHUB_REF_NAME" \
                --notes-file release-notes.md; then
            gh release edit "$GITHUB_REF_NAME" \
                --repo "$GITHUB_REPOSITORY" --notes-file release-notes.md
            gh release upload "$GITHUB_REF_NAME" dist/*.s9pk \
                --repo "$GITHUB_REPOSITORY" --clobber
          fi
